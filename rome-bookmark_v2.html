<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ROME</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.jpeg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
      gap: 28px;
    }
    img {
      width: 140px;
      height: 140px;
      border-radius: 28px;
      object-fit: cover;
    }
    h1 {
      color: #c9a84c;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.1em;
    }
    p {
      color: #888;
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
      padding: 0 40px;
    }
    .instructions {
      background: #111;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 16px 20px;
      color: #aaa;
      font-size: 13px;
      line-height: 1.8;
      text-align: left;
      width: calc(100% - 48px);
      max-width: 320px;
    }
    .instructions span { color: #c9a84c; }
    a.btn {
      display: block;
      background: #c9a84c;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.05em;
      text-decoration: none;
      padding: 16px 48px;
      border-radius: 50px;
    }
  </style>
</head>
<body>
  <img src="apple-touch-icon.jpeg" alt="ROME Logo">
  <h1>ROME</h1>
  <div class="instructions">
    To add to your home screen:<br>
    1. Tap <span>Share ↑</span> at the bottom<br>
    2. Tap <span>Add to Home Screen</span><br>
    3. Tap <span>Add</span>
  </div>
  <a class="btn" href="https://romeintel.com/">Open ROME →</a>
</body>
</html>
