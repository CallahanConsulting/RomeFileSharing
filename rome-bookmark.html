<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ROME</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.jpeg">
  <script>
    if (window.navigator.standalone === true) {
      window.location.replace("https://romeintel.com/");
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
      gap: 28px;
      padding: 24px;
    }
    img {
      width: 140px;
      height: 140px;
      border-radius: 28px;
      object-fit: cover;
    }
    h1 { color: #c9a84c; font-size: 22px; font-weight: 600; letter-spacing: 0.1em; }
    .instructions {
      background: #111;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 16px 20px;
      color: #aaa;
      font-size: 13px;
      line-height: 2;
      text-align: left;
      width: 100%;
      max-width: 320px;
    }
    .instructions span { color: #c9a84c; font-weight: 600; }
    .instructions .step-last { color: #fff; }
  </style>
</head>
<body>
  <img src="apple-touch-icon.jpeg" alt="ROME Logo">
  <h1>ROME</h1>
  <div class="instructions">
    1. Tap <span>Share ↑</span> at the bottom<br>
    2. Tap <span>Add to Home Screen</span><br>
    3. Tap <span>Add</span><br>
    4. <span class="step-last">Go to your Home Screen — the ROME icon is ready! 🏛️</span>
  </div>
</body>
</html>
